name: play_flutter
description: "A comprehensive media player for Flutter - supports audio and video playback."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.1
  
  provider: ^6.1.1
  
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  just_audio: ^0.9.36
  
  permission_handler: ^11.1.0
  file_picker: ^8.0.0
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  cached_network_image: ^3.3.0
  
  flutter_animate: ^4.3.0
  
  wakelock_plus: ^1.1.4
  
  uuid: ^4.2.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_native_splash:
  color: "#1a1a2e"
  fullscreen: true
  
  android: true
  android_gravity: center
  
  ios: true
  ios_content_mode: center
  
  android_12:
    color: "#1a1a2e"
